services:
  - type: web
    name: web-automi
    env: docker
    region: ohio
    plan: free
    dockerCommand: uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
